  <path d="M74,84 C79,80 88,79 93,82" stroke="#180600" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M107,82 C112,79 121,80 126,84" stroke="#180600" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Glasses frame -->
  <rect x="68" y="85" width="26" height="18" rx="5" fill="none" stroke="#3A2A1A" stroke-width="2.5"/>
  <rect x="106" y="85" width="26" height="18" rx="5" fill="none" stroke="#3A2A1A" stroke-width="2.5"/>
  <line x1="94" y1="93" x2="106" y2="93" stroke="#3A2A1A" stroke-width="2"/>
  <line x1="45" y1="90" x2="68" y2="90" stroke="#3A2A1A" stroke-width="2"/>
  <line x1="132" y1="90" x2="155" y2="90" stroke="#3A2A1A" stroke-width="2"/>
  <!-- Eyes inside glasses -->
  <circle cx="81" cy="93" r="5.5" fill="#180600"/>
  <circle cx="119" cy="93" r="5.5" fill="#180600"/>
  <circle cx="83" cy="91" r="2" fill="white"/>
  <circle cx="121" cy="91" r="2" fill="white"/>
  <!-- Nose -->
  <circle cx="96" cy="110" r="2.8" fill="#906020"/>
  <circle cx="104" cy="110" r="2.8" fill="#906020"/>
  <path d="M94,112 C97,116 103,116 106,112" stroke="#906020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M87,123 C93,129 107,129 113,123" stroke="#8B3820" stroke-width="2" fill="none" stroke-linecap="round"/>
