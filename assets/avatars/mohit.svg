<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="100" fill="#4A6A8A"/>
  <!-- Shirt (casual, no tie) -->
  <path d="M18,200 C18,158 58,142 100,142 C142,142 182,158 182,200Z" fill="#345870"/>
  <polygon points="88,142 100,160 112,142" fill="#4A90C8"/>
  <!-- Neck -->
  <rect x="87" y="126" width="26" height="20" rx="4" fill="#D4906A"/>
  <!-- Head -->
  <ellipse cx="100" cy="98" rx="47" ry="50" fill="#D4906A"/>
  <!-- Ears -->
  <path d="M53,90 C46,92 43,100 43,104 C43,108 46,114 53,114 C55,106 55,96 53,90Z" fill="#C07050"/>
  <path d="M147,90 C154,92 157,100 157,104 C157,108 154,114 147,114 C145,106 145,96 147,90Z" fill="#C07050"/>
  <!-- Short hair (young, slightly textured) -->
  <ellipse cx="100" cy="54" rx="47" ry="12" fill="#200A00"/>
  <rect x="53" y="54" width="94" height="26" fill="#200A00"/>
  <path d="M53,80 C53,60 68,50 100,50 C132,50 147,60 147,80Z" fill="#200A00"/>
  <!-- Slight side part detail -->
  <path d="M90,52 C90,58 88,62 86,65" stroke="#301000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows (thinner, younger) -->
  <path d="M75,85 C80,81 88,80 93,83" stroke="#200A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M107,83 C112,80 120,81 125,85" stroke="#200A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="83" cy="93" rx="10" ry="9" fill="white"/>
  <ellipse cx="117" cy="93" rx="10" ry="9" fill="white"/>
  <circle cx="84" cy="93" r="6" fill="#200A00"/>
  <circle cx="118" cy="93" r="6" fill="#200A00"/>
  <circle cx="86" cy="91" r="2" fill="white"/>
  <circle cx="120" cy="91" r="2" fill="white"/>
  <!-- Nose -->
  <circle cx="96" cy="108" r="2.5" fill="#A86040"/>
  <circle cx="104" cy="108" r="2.5" fill="#A86040"/>
  <path d="M95,110 C97,114 103,114 105,110" stroke="#A86040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth (friendly smile) -->
  <path d="M86,121 C92,128 108,128 114,121" stroke="#904030" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
