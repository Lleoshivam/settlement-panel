  <path d="M107,82 C112,79 121,80 126,84" stroke="#180600" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="83" cy="93" rx="10" ry="9" fill="white"/>
  <ellipse cx="117" cy="93" rx="10" ry="9" fill="white"/>
  <circle cx="84" cy="93" r="6" fill="#180600"/>
  <circle cx="118" cy="93" r="6" fill="#180600"/>
  <circle cx="86" cy="91" r="2" fill="white"/>
  <circle cx="120" cy="91" r="2" fill="white"/>
  <!-- Nose -->
  <circle cx="96" cy="108" r="2.8" fill="#906020"/>
  <circle cx="104" cy="108" r="2.8" fill="#906020"/>
  <path d="M94,110 C97,114 103,114 106,110" stroke="#906020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
