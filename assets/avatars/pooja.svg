  <circle cx="53" cy="114" r="2" fill="#FFD700"/>
  <line x1="147" y1="107" x2="147" y2="113" stroke="#FFD700" stroke-width="2"/>
  <circle cx="147" cy="114" r="2" fill="#FFD700"/>
